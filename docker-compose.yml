version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zapflow-postgres
    environment:
      POSTGRES_DB: zapflow
      POSTGRES_USER: zapflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zapflow123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zapflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    container_name: zapflow-bff
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://zapflow:${DB_PASSWORD:-zapflow123}@postgres:5432/zapflow
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/bff/src:/app/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: zapflow-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
      NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    depends_on:
      - bff
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/lib:/app/lib

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: zapflow-network
